<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Monthly Reports Dashboard</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Lexend',sans-serif;background:#f0f2f7;color:#1a1d23;min-height:100vh;}
/* Lock */
.lock-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:#f0f2f7;z-index:100000;display:flex;align-items:center;justify-content:center;padding:20px;}.lock-overlay.hidden{display:none;}
.lock-card{background:#fff;border-radius:16px;padding:40px 36px;max-width:380px;width:100%;box-shadow:0 12px 48px rgba(0,0,0,.12);text-align:center;}
.lock-icon{font-size:48px;margin-bottom:16px;}.lock-title{font-size:20px;font-weight:800;margin-bottom:6px;}.lock-sub{font-size:12px;color:#6b7280;margin-bottom:24px;line-height:1.7;}
.lock-input{width:100%;padding:12px 16px;border:2px solid #e8eaed;border-radius:10px;font-size:14px;font-family:'Lexend',sans-serif;text-align:center;background:#f8f9fc;letter-spacing:2px;-webkit-appearance:none;}
.lock-input:focus{outline:none;border-color:#3b5bdb;box-shadow:0 0 0 4px rgba(59,91,219,.12);background:#fff;}
.lock-input.error{border-color:#dc2626;animation:shake .4s;}
@keyframes shake{0%,100%{transform:translateX(0);}20%,60%{transform:translateX(-8px);}40%,80%{transform:translateX(8px);}}
.lock-btn{width:100%;padding:13px 0;margin-top:16px;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Lexend',sans-serif;background:linear-gradient(135deg,#3b5bdb,#364fc7);color:#fff;}
.lock-btn:disabled{opacity:.5;}.lock-error{font-size:11px;color:#dc2626;margin-top:10px;min-height:16px;font-weight:600;}.lock-hint{font-size:10px;color:#9ca3af;margin-top:16px;}.lock-hint a{color:#3b5bdb;font-weight:700;text-decoration:none;}
/* Nav */
.topnav{background:#fff;border-bottom:1px solid #e8eaed;padding:12px 24px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:1000;box-shadow:0 2px 8px rgba(0,0,0,.04);}
.topnav-brand{font-size:16px;font-weight:800;color:#3b5bdb;cursor:pointer;}.topnav-sep{color:#d1d5db;}.topnav-crumb{font-size:12px;font-weight:600;color:#6b7280;cursor:pointer;padding:4px 10px;border-radius:6px;}.topnav-crumb:hover{background:#f0f4ff;color:#3b5bdb;}.topnav-crumb.active{color:#1a1d23;font-weight:700;}
.topnav-right{margin-left:auto;display:flex;gap:8px;}.topnav-btn{padding:6px 14px;border-radius:6px;font-size:10px;font-weight:700;cursor:pointer;font-family:'Lexend',sans-serif;border:1px solid #e8eaed;background:#fff;color:#6b7280;}.topnav-btn:hover{border-color:#3b5bdb;color:#3b5bdb;}
/* Home */
.home-screen{max-width:800px;margin:0 auto;padding:40px 20px;}.home-title{font-size:28px;font-weight:800;text-align:center;margin-bottom:6px;}.home-sub{font-size:13px;color:#6b7280;text-align:center;margin-bottom:32px;}
.game-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;margin-bottom:24px;}
.game-card{background:#fff;border:1.5px solid #e8eaed;border-radius:14px;padding:24px 20px;cursor:pointer;transition:all .2s;position:relative;}.game-card:hover{border-color:#3b5bdb;box-shadow:0 4px 20px rgba(59,91,219,.12);transform:translateY(-2px);}
.game-card-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;color:#fff;margin-bottom:14px;}.game-card-name{font-size:15px;font-weight:700;margin-bottom:4px;}.game-card-meta{font-size:10px;color:#9ca3af;}
.game-card-del{position:absolute;top:10px;right:10px;background:none;border:none;color:#d1d5db;font-size:16px;cursor:pointer;opacity:0;}.game-card:hover .game-card-del{opacity:1;}.game-card-del:hover{color:#dc2626;}
.add-game-card{background:#f8f9fc;border:2px dashed #d1d5db;border-radius:14px;padding:24px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:160px;}.add-game-card:hover{border-color:#3b5bdb;background:#f0f4ff;}
/* Report picker */
.rp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;margin-bottom:20px;}
.rp-card{background:#fff;border:1.5px solid #e8eaed;border-radius:12px;padding:20px;cursor:pointer;transition:all .2s;position:relative;}.rp-card:hover{border-color:#3b5bdb;box-shadow:0 4px 16px rgba(59,91,219,.1);}
.rp-card-del{position:absolute;top:8px;right:8px;background:none;border:none;color:#d1d5db;font-size:14px;cursor:pointer;opacity:0;padding:2px 6px;border-radius:4px;line-height:1;}.rp-card:hover .rp-card-del{opacity:1;}.rp-card-del:hover{color:#dc2626;background:#fef2f2;}
.rp-card-icon{font-size:28px;margin-bottom:10px;}.rp-card-name{font-size:14px;font-weight:700;margin-bottom:4px;}.rp-card-desc{font-size:10px;color:#9ca3af;line-height:1.6;}
/* Modal */
.cmodal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.45);z-index:99999;backdrop-filter:blur(3px);justify-content:center;align-items:center;}.cmodal-overlay.show{display:flex;}
.cmodal{background:#fff;border-radius:14px;padding:28px 32px;max-width:420px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,.2);}
.cmodal-icon{font-size:32px;text-align:center;margin-bottom:12px;}.cmodal-title{font-size:15px;font-weight:700;text-align:center;margin-bottom:6px;}.cmodal-msg{font-size:12px;text-align:center;color:#6b7280;line-height:1.7;margin-bottom:20px;}.cmodal-btns{display:flex;gap:10px;justify-content:center;}
.cmodal-btn{padding:9px 22px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Lexend',sans-serif;border:none;}.cmodal-btn.cancel{background:#f3f4f6;color:#6b7280;}.cmodal-btn.confirm{background:#3b5bdb;color:#fff;}.cmodal-btn.danger{background:#dc2626;color:#fff;}.cmodal-btn.demo{background:#7c3aed;color:#fff;}
.cmodal-input{width:100%;padding:10px 14px;border:1.5px solid #e8eaed;border-radius:8px;font-size:13px;font-family:'Lexend',sans-serif;margin-bottom:10px;text-align:center;}.cmodal-input:focus{outline:none;border-color:#3b5bdb;}
.cmodal-colors{display:flex;gap:8px;justify-content:center;margin-bottom:16px;flex-wrap:wrap;}.cmodal-color{width:36px;height:36px;border-radius:10px;cursor:pointer;border:3px solid transparent;}.cmodal-color.selected{border-color:#1a1d23;transform:scale(1.15);}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(26,29,35,.88);color:#fff;font-size:11px;font-weight:600;padding:8px 18px;border-radius:20px;pointer-events:none;opacity:0;transition:opacity .3s;z-index:99998;}.toast.show{opacity:1;}
/* UA page */
.ua-page{max-width:1060px;margin:0 auto;background:#fff;padding:32px 34px 40px;box-shadow:0 8px 40px rgba(0,0,0,.08);border-radius:14px;margin-top:12px;}
.ua-bar{display:flex;align-items:center;justify-content:space-between;background:#f8f9fc;border:1px solid #e8eaed;border-radius:10px;padding:10px 16px;margin-bottom:16px;flex-wrap:wrap;gap:8px;}
.ua-bar-left{display:flex;align-items:center;gap:8px;font-size:11px;font-weight:600;}.ua-bar-right{display:flex;gap:8px;flex-wrap:wrap;}
.ua-btn{padding:6px 16px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Lexend',sans-serif;border:1px solid #e8eaed;background:#fff;color:#6b7280;touch-action:manipulation;}.ua-btn:hover{border-color:#3b5bdb;color:#3b5bdb;background:#f0f4ff;}.ua-btn.danger{border-color:#fecaca;color:#dc2626;}.ua-btn.mode{border-color:#e9d5ff;color:#7c3aed;background:#f5f3ff;}.ua-btn.mode.active{background:#7c3aed;color:#fff;border-color:#7c3aed;}
.ua-btn.inbox{border-color:#fbbf24;color:#b45309;background:#fffbeb;position:relative;}.ua-btn.inbox:hover{border-color:#f59e0b;background:#fef3c7;}
.inbox-badge{position:absolute;top:-6px;right:-6px;background:#dc2626;color:#fff;font-size:9px;font-weight:800;min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 4px;}
.sdot{width:8px;height:8px;border-radius:50%;display:inline-block;}.sdot.ok{background:#059669;}.sdot.un{background:#f59e0b;animation:pp 1.5s infinite;}.sdot.sv{background:#3b5bdb;animation:pp .6s infinite;}@keyframes pp{0%,100%{opacity:1;}50%{opacity:.4;}}
.ua-badge{font-size:12px;font-weight:700;padding:6px 12px;border-radius:999px;}.ua-badge.cur{color:#059669;background:#ecfdf5;border:1px solid #a7f3d0;}.ua-badge.prev{color:#7c3aed;background:#f5f3ff;border:1px solid #e9d5ff;}
.ua-sec{margin-bottom:32px;}.ua-sec-t{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:#9ca3af;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid #e8eaed;display:flex;align-items:center;gap:8px;}
.ua-sec-icon{width:18px;height:18px;border-radius:5px;display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:#fff;flex-shrink:0;}
.ua-sub{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin:18px 0 10px;padding:5px 12px;border-radius:6px;display:inline-block;}
.ua-fl{font-size:10px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px;}
.ua-mg{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.tw{overflow-x:auto;margin-bottom:4px;border-radius:8px;}
.ua-page table{width:100%;border-collapse:separate;border-spacing:0;font-size:11px;margin-bottom:4px;border:1px solid #e8eaed;border-radius:8px;overflow:hidden;}
.ua-page thead tr{background:#f8f9fc;}.ua-page th{padding:8px 4px;text-align:center;font-size:8px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.4px;border-bottom:2px solid #e8eaed;white-space:nowrap;}.ua-page th:first-child{text-align:left;padding-left:12px;}
.ua-page td{padding:6px 4px;border-bottom:1px solid #f3f4f6;text-align:center;}.ua-page td:first-child{text-align:left;padding-left:12px;font-weight:600;font-size:11px;}.ua-page tbody tr:last-child td{border-bottom:none;}.ua-page tbody tr:hover{background:#fafbfd;}
.ua-page input[type="text"],.ua-page select,.ua-page textarea{width:100%;padding:7px 6px;border:1px solid #e8eaed;border-radius:6px;font-size:11px;font-family:'Lexend',sans-serif;color:#1a1d23;background:#fffef5;text-align:center;-webkit-appearance:none;}
.ua-page input:focus,.ua-page select:focus,.ua-page textarea:focus{outline:none;border-color:#3b5bdb;box-shadow:0 0 0 3px rgba(59,91,219,.12);}
.ua-page textarea{text-align:left;min-height:80px;padding:12px 14px;resize:vertical;line-height:1.8;}.ua-page select{appearance:auto;-webkit-appearance:auto;cursor:pointer;}
.ua-page input.eng{background:#f0fdf4!important;border-color:#bbf7d0!important;}
.cc{background:#fefce8;color:#92400e;}.ce{background:#f0fdf4;color:#166534;}.cr{background:#faf5ff;color:#6b21a8;}.cd{border-left:2px solid #e2e5ea!important;}
.hg th{padding:5px 4px;font-size:8px;font-weight:800;letter-spacing:1px;border-bottom:none;text-align:center;}
.ga{background:#fefce8;color:#92400e;border-bottom:1px solid #fde68a;}.ge{background:#f0fdf4;color:#166534;border-bottom:1px solid #bbf7d0;}
.chip{display:inline-block;font-size:8px;font-weight:700;padding:2px 7px;border-radius:10px;text-transform:uppercase;letter-spacing:.4px;margin-left:6px;vertical-align:middle;}.co{background:#ecfdf5;color:#059669;}.cp{background:#fef3c7;color:#b45309;}.cf{background:#eef2ff;color:#3b5bdb;margin-left:0;}
.delta{font-size:9px;font-weight:700;border-radius:8px;padding:1px 6px;display:inline-block;white-space:nowrap;margin-top:2px;}.delta.up{background:#E1F5EE;color:#0F6E56;}.delta.down{background:#FCEBEB;color:#A32D2D;}.delta.flat{background:#f3f4f6;color:#9ca3af;}
.stk{display:flex;flex-direction:column;align-items:center;gap:1px;}.fl{font-weight:700;color:#3b5bdb;font-size:11px;white-space:nowrap;}
.ud{height:1px;background:linear-gradient(to right,transparent,#e8eaed,transparent);margin:32px 0;}
.ra{display:flex;gap:8px;margin-top:8px;align-items:center;}
.ab,.rb{display:inline-flex;align-items:center;gap:5px;background:#fff;border:1px dashed #d1d5db;border-radius:6px;padding:7px 16px;font-size:11px;font-weight:600;color:#6b7280;cursor:pointer;font-family:'Lexend',sans-serif;}.ab:hover{border-color:#3b5bdb;color:#3b5bdb;background:#f0f4ff;border-style:solid;}.rb{border-color:#fecaca;color:#dc2626;}.rb:disabled{opacity:.25;pointer-events:none;}
.db{background:none;border:none;color:#d1d5db;font-size:14px;cursor:pointer;padding:2px 6px;border-radius:4px;line-height:1;}.db:hover{color:#dc2626;background:#fef2f2;}
.rg{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}.rg>div{background:#f8f9fc;padding:10px 12px;border-radius:8px;border:1px solid #e8eaed;}
.ow{margin-top:24px;border:2px solid #3b5bdb;border-radius:12px;overflow:hidden;display:none;}.ow.show{display:block;}.oh{background:linear-gradient(135deg,#3b5bdb,#364fc7);color:#fff;padding:12px 18px;display:flex;justify-content:space-between;align-items:center;}.oh span{font-size:13px;font-weight:700;}.oh button{background:#fff;color:#3b5bdb;border:none;border-radius:6px;padding:7px 18px;font-weight:700;font-size:12px;cursor:pointer;font-family:'Lexend',sans-serif;}
/* Ad source */
.sb{background:linear-gradient(135deg,#eef2ff,#e0e7ff);border-left:1px solid #e8eaed;border-right:1px solid #e8eaed;border-bottom:2px solid #c7d2fe;padding:10px 16px;display:flex;align-items:center;gap:12px;min-width:702px;}
.sb .si{width:22px;height:22px;border-radius:6px;background:linear-gradient(135deg,#3b5bdb,#364fc7);display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;font-weight:800;flex-shrink:0;}
.sb .sn{font-size:13px;font-weight:700;color:#3b5bdb;}.sb .sc{font-size:9px;font-weight:700;color:#6366f1;background:#e0e7ff;padding:2px 8px;border-radius:10px;text-transform:uppercase;}.sb .db{margin-left:auto;font-size:16px;}
.ct{width:100%;border-collapse:separate;border-spacing:0;font-size:11px;table-layout:fixed;min-width:702px;border-left:1px solid #e8eaed;border-right:1px solid #e8eaed;}
.ct td{padding:6px 4px;text-align:center;vertical-align:middle;border-bottom:1px solid #f3f4f6;background:#fff;}.ct td:first-child{text-align:left;padding-left:12px;font-weight:600;font-size:11px;}.ct tr:last-child td{border-bottom:none;}.ct tr:hover td{background:#fafbfd;}.ct input,.ct select{width:100%;min-width:0;}
.cl{display:flex;align-items:center;gap:5px;min-width:0;}.cl::before{content:'↳';color:#a5b4fc;font-size:14px;font-weight:800;flex-shrink:0;}
.cab{border-left:1px solid #e8eaed;border-right:1px solid #e8eaed;border-bottom:3px solid #e8eaed;background:#f8faff;padding:6px 12px;min-width:702px;}
.sac{display:inline-flex;align-items:center;gap:4px;background:#fff;border:1px dashed #c7d2fe;border-radius:6px;padding:5px 14px;font-size:10px;font-weight:700;color:#3b5bdb;cursor:pointer;font-family:'Lexend',sans-serif;}.sac:hover{background:#eef2ff;border-style:solid;}
.sg:last-child .cab{border-radius:0 0 8px 8px;}
.aht{width:100%;border-collapse:separate;border-spacing:0;font-size:11px;border:1px solid #e8eaed;border-radius:8px 8px 0 0;overflow:hidden;table-layout:fixed;min-width:702px;}.aht thead tr{background:#f8f9fc;}
body.prev-mode .ua-page{border:3px solid #7c3aed;box-shadow:0 0 0 6px rgba(124,58,237,.08);}
body.prev-mode .ua-page input[type="text"]:not([readonly]){background:#f5f3ff!important;border-color:#e9d5ff!important;border-style:dashed!important;}
body.prev-mode .ua-page input.eng{background:#f0eaff!important;border-color:#ddd6fe!important;}
/* VH */
.vb{background:#fff;border:1.5px solid #e8eaed;border-radius:12px;margin-bottom:20px;overflow:hidden;}.vsr{display:flex;gap:8px;padding:12px 16px;align-items:center;background:#f8f9fc;border-bottom:1px solid #e8eaed;}.vsr input{flex:1;padding:9px 12px;border:1px solid #e8eaed;border-radius:8px;font-size:12px;font-family:'Lexend',sans-serif;background:#fff;text-align:left;}
.vsb{padding:9px 18px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Lexend',sans-serif;border:none;background:linear-gradient(135deg,#3b5bdb,#364fc7);color:#fff;white-space:nowrap;}
.vtg{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;cursor:pointer;user-select:none;}.vtg:hover{background:#f8f9fc;}.vtl{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700;color:#374151;}.vtc{background:#eef2ff;color:#3b5bdb;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;}.vta{font-size:11px;color:#9ca3af;transition:transform .25s;}.vta.open{transform:rotate(180deg);}
.vbd{display:none;padding:0 16px 16px;}.vbd.open{display:block;}.vem{text-align:center;padding:24px 16px;color:#9ca3af;font-size:12px;}
.vi{border:1px solid #e8eaed;border-radius:10px;margin-bottom:10px;overflow:hidden;}.vi:last-child{margin-bottom:0;}.vih{display:flex;align-items:center;gap:10px;padding:12px 14px;background:#f8f9fc;border-bottom:1px solid #f3f4f6;flex-wrap:wrap;}.vit{font-size:14px;font-weight:700;}.vib{font-size:8px;font-weight:700;padding:2px 8px;border-radius:10px;text-transform:uppercase;background:#ecfdf5;color:#059669;}.vid{font-size:10px;color:#9ca3af;margin-left:auto;}
.vip{display:flex;gap:8px;padding:10px 14px;flex-wrap:wrap;}.vik{background:#f8f9fc;border:1px solid #f3f4f6;border-radius:8px;padding:8px 10px;min-width:90px;flex:1;}.vikl{font-size:8px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px;}.vikv{font-size:13px;font-weight:700;display:flex;align-items:center;gap:5px;flex-wrap:wrap;}.vikv .delta{font-size:8px;padding:1px 5px;}
.vin{padding:4px 14px 8px;font-size:10px;color:#6b7280;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}.via{display:flex;gap:8px;padding:8px 14px 12px;}
.vbtn{padding:6px 14px;border-radius:6px;font-size:10px;font-weight:700;cursor:pointer;font-family:'Lexend',sans-serif;border:1px solid #e8eaed;background:#fff;color:#6b7280;}.vbtn.res{border-color:#a7f3d0;color:#059669;background:#ecfdf5;}.vbtn.dan{border-color:#fecaca;color:#dc2626;}
/* Config */
.cw{margin-top:12px;border:2px dashed #d1d5db;border-radius:12px;padding:28px;background:#f8f9fc;position:relative;}.cwb{position:absolute;top:-11px;left:24px;background:#6b7280;color:#fff;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;padding:3px 12px;border-radius:20px;}
.cg{display:grid;grid-template-columns:1fr 1fr;gap:20px;}.ccl{background:#fff;border:1px solid #e8eaed;border-radius:10px;padding:16px;}.cct{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#6b7280;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.cts{display:flex;flex-wrap:wrap;gap:6px;min-height:32px;}.ctg{display:inline-flex;align-items:center;gap:4px;background:#eef2ff;color:#3b5bdb;font-size:10px;font-weight:600;padding:4px 10px;border-radius:16px;white-space:nowrap;}.ctg button{background:none;border:none;color:#93a3d8;font-size:12px;cursor:pointer;padding:0;line-height:1;}.ctg button:hover{color:#dc2626;}
.car{display:flex;gap:6px;margin-top:10px;}.car input,.car select{flex:1;padding:6px 10px;border:1px solid #e8eaed;border-radius:6px;font-size:11px;font-family:'Lexend',sans-serif;background:#fff;text-align:left;}.carb{background:#3b5bdb;color:#fff;border:none;border-radius:6px;padding:6px 14px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Lexend',sans-serif;}
/* RID bar */
.rid-bar{background:#fff;border:1.5px solid #e8eaed;border-radius:12px;margin-bottom:20px;overflow:hidden;}
.rid-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;background:#f8f9fc;border-bottom:1px solid #e8eaed;flex-wrap:wrap;gap:8px;}
.rid-hdr-t{font-size:13px;font-weight:700;display:flex;align-items:center;gap:8px;}
.rid-tabs{display:flex;gap:0;overflow-x:auto;}.rid-tab{padding:10px 18px;font-size:12px;font-weight:600;color:#6b7280;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s;position:relative;}.rid-tab:hover{color:#3b5bdb;background:#f0f4ff;}.rid-tab.active{color:#3b5bdb;border-bottom-color:#3b5bdb;font-weight:700;background:#eef2ff;}

<body>
<div class="lock-overlay" id="lockOv"><div class="lock-card"><div class="lock-icon" id="lkI">🔒</div><div class="lock-title" id="lkT">Enter Password</div><div class="lock-sub" id="lkS">This dashboard is password protected.</div><input type="password" class="lock-input" id="lkIn" placeholder="••••••••" autocomplete="off"><div class="lock-error" id="lkE"></div><button class="lock-btn" id="lkB">Unlock</button><div class="lock-hint" id="lkH"></div></div></div>
<div class="topnav" id="topnav" style="display:none;"><div class="topnav-brand" onclick="goHome()">📊 Reports</div><span class="topnav-sep" id="ns1" style="display:none;">›</span><span class="topnav-crumb" id="nG" style="display:none;" onclick="goGame()"></span><span class="topnav-sep" id="ns2" style="display:none;">›</span><span class="topnav-crumb active" id="nR" style="display:none;"></span><div class="topnav-right"><button class="topnav-btn" onclick="pwChange()">🔒</button></div></div>
<div id="sHome" style="display:none;"></div>
<div id="sReports" style="display:none;"></div>
<div id="sForm" style="display:none;padding:12px 16px 40px;"></div>
<!-- Sub review overlay -->
<div class="sub-ov" id="subOv"><div class="sub-panel"><div class="sub-panel-hdr"><span>📩 Review Submissions</span><button onclick="closeSubOv()">✕ Close</button></div><div class="sub-panel-body" id="subOvBody"></div></div></div>
<div class="cmodal-overlay" id="cmOv"><div class="cmodal"><div class="cmodal-icon" id="cmI"></div><div class="cmodal-title" id="cmT"></div><div class="cmodal-msg" id="cmM"></div><div class="cmodal-btns" id="cmB"></div></div></div>
<div class="toast" id="tst"></div>

<script>
var FB='https://monthly-reports-database-default-rtdb.asia-southeast1.firebasedatabase.app';
async function fbG(p){try{var r=await fetch(FB+p+'.json');if(r.ok)return await r.json();}catch(e){}return null;}
async function fbS(p,d){try{var r=await fetch(FB+p+'.json',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)});return r.ok;}catch(e){}return false;}
async function fbD(p){try{await fetch(FB+p+'.json',{method:'DELETE'});}catch(e){}}
function toast(m){var t=document.getElementById('tst');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove('show');},1800);}
function modal(o){document.getElementById('cmI').textContent=o.icon||'';document.getElementById('cmT').textContent=o.title||'';document.getElementById('cmM').innerHTML=o.msg||'';var b=document.getElementById('cmB');b.innerHTML='';if(o.cancel!==false){var c=document.createElement('button');c.className='cmodal-btn cancel';c.textContent=o.cancelText||'Cancel';c.onclick=cModal;b.appendChild(c);}var ok=document.createElement('button');ok.className='cmodal-btn '+(o.cls||'confirm');ok.textContent=o.okText||'OK';ok.onclick=function(){if(!o.keep)cModal();if(o.onOk)o.onOk();};b.appendChild(ok);var ov=document.getElementById('cmOv');if(o.crit)ov.setAttribute('data-c','1');ov.classList.add('show');}
function cModal(){var o=document.getElementById('cmOv');o.classList.remove('show');o.removeAttribute('data-c');}
document.getElementById('cmOv').addEventListener('click',function(e){if(e.target===this&&!this.getAttribute('data-c'))cModal();});
document.getElementById('subOv').addEventListener('click',function(e){if(e.target===this)closeSubOv();});
function closeSubOv(){document.getElementById('subOv').classList.remove('show');}
function esc(s){if(!s)return'';var d=document.createElement('div');d.textContent=s;return d.innerHTML;}

/* ═══ AUTH ═══ */
async function hashP(p){var e=new TextEncoder().encode(p);var b=await crypto.subtle.digest('SHA-256',e);return Array.from(new Uint8Array(b)).map(function(x){return x.toString(16).padStart(2,'0');}).join('');}
function genRK(){var c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789',k='';for(var i=0;i<16;i++){if(i>0&&i%4===0)k+='-';k+=c.charAt(Math.floor(Math.random()*c.length));}return k;}
function showRKModal(key){modal({icon:'🔑',title:'Save Your Recovery Key',msg:'<div style="text-align:center;line-height:2;"><div style="font-size:11px;color:#dc2626;font-weight:700;margin-bottom:10px;">⚠ SAVE THIS NOW — shown only once!</div><div style="background:#f8f9fc;border:2px dashed #3b5bdb;border-radius:10px;padding:14px;margin:10px 0;"><span style="font-size:18px;font-weight:800;letter-spacing:2px;color:#3b5bdb;font-family:monospace;">'+key+'</span></div></div>',okText:'📋 Copy',cancelText:'I saved it',crit:true,keep:true,onOk:function(){try{navigator.clipboard.writeText(key);}catch(e){}var b=document.querySelector('#cmB .cmodal-btn.confirm');if(b){b.textContent='✅ Copied!';setTimeout(function(){b.textContent='📋 Copy';},1500);}}});}
async function initAuth(){var ov=document.getElementById('lockOv'),inp=document.getElementById('lkIn'),btn=document.getElementById('lkB'),err=document.getElementById('lkE');var st=await fbG('/auth/pw');if(!st){document.getElementById('lkI').textContent='🔐';document.getElementById('lkT').textContent='Set a Password';document.getElementById('lkS').innerHTML='First time setup.';inp.placeholder='Create password (min 4 chars)';btn.textContent='Set Password & Enter';document.getElementById('lkH').textContent='Share with your team.';btn.onclick=async function(){var p=inp.value;if(p.length<4){err.textContent='Min 4 characters';inp.classList.add('error');setTimeout(function(){inp.classList.remove('error');},500);return;}btn.disabled=true;btn.textContent='Setting up…';await fbS('/auth/pw',await hashP(p));var rk=genRK();await fbS('/auth/rk',await hashP(rk));ov.classList.add('hidden');btn.disabled=false;showRKModal(rk);startApp();};}else{document.getElementById('lkH').innerHTML='<a href="#" id="fgL">Forgot? Reset with recovery key</a>';btn.onclick=async function(){var p=inp.value;if(!p){inp.focus();return;}btn.disabled=true;btn.textContent='Checking…';var h=await hashP(p);if(h===st){ov.classList.add('hidden');btn.disabled=false;startApp();}else{err.textContent='Wrong password.';inp.classList.add('error');inp.value='';inp.focus();setTimeout(function(){inp.classList.remove('error');},500);btn.disabled=false;btn.textContent='Unlock';}};setTimeout(function(){var fl=document.getElementById('fgL');if(fl)fl.onclick=function(e){e.preventDefault();resetUI();};},50);}inp.onkeydown=function(e){if(e.key==='Enter')btn.click();err.textContent='';};}
function resetUI(){var inp=document.getElementById('lkIn'),btn=document.getElementById('lkB'),err=document.getElementById('lkE');document.getElementById('lkI').textContent='🔑';document.getElementById('lkT').textContent='Reset Password';document.getElementById('lkS').innerHTML='Enter recovery key + new password.';err.textContent='';inp.value='';inp.type='text';inp.placeholder='XXXX-XXXX-XXXX-XXXX';inp.style.textTransform='uppercase';var np=document.createElement('input');np.type='password';np.className='lock-input';np.id='lkNP';np.placeholder='New password';np.style.marginTop='10px';inp.parentNode.insertBefore(np,err);btn.textContent='Reset Password';document.getElementById('lkH').innerHTML='<a href="#" id="bkL">← Back to login</a>';btn.onclick=async function(){var rk=inp.value.trim().toUpperCase(),nw=document.getElementById('lkNP').value;if(!rk){err.textContent='Enter recovery key';return;}if(!nw||nw.length<4){err.textContent='Min 4 chars';return;}btn.disabled=true;btn.textContent='Verifying…';var rkH=await hashP(rk),stRk=await fbG('/auth/rk');if(rkH!==stRk){err.textContent='Invalid key';btn.disabled=false;btn.textContent='Reset Password';return;}await fbS('/auth/pw',await hashP(nw));var nrk=genRK();await fbS('/auth/rk',await hashP(nrk));document.getElementById('lockOv').classList.add('hidden');var o=document.getElementById('lkNP');if(o)o.remove();inp.type='password';inp.style.textTransform='';btn.disabled=false;showRKModal(nrk);startApp();};setTimeout(function(){var bl=document.getElementById('bkL');if(bl)bl.onclick=function(e){e.preventDefault();var o=document.getElementById('lkNP');if(o)o.remove();inp.type='password';inp.value='';inp.style.textTransform='';initAuth();};},50);}
function pwChange(){modal({icon:'🔒',title:'Change Password',msg:'<input type="password" class="cmodal-input" id="pwO" placeholder="Current password"><input type="password" class="cmodal-input" id="pwN" placeholder="New password"><div id="pwE" style="font-size:11px;color:#dc2626;min-height:16px;font-weight:600;"></div>',okText:'Change',cls:'confirm',onOk:async function(){var o=document.getElementById('pwO'),n=document.getElementById('pwN'),er=document.getElementById('pwE');if(!o||!n||!o.value||!n.value){if(er)er.textContent='Fill both';return;}if(n.value.length<4){if(er)er.textContent='Min 4 chars';return;}var oh=await hashP(o.value),st=await fbG('/auth/pw');if(oh!==st){if(er)er.textContent='Wrong current password';return;}await fbS('/auth/pw',await hashP(n.value));var rk=genRK();await fbS('/auth/rk',await hashP(rk));cModal();setTimeout(function(){showRKModal(rk);},300);toast('Password changed!');}});}

/* ═══ GAMES ═══ */
var GAMES=[],curGame=null,curRpt=null,curRID=null;
var COLORS=['#3b5bdb','#059669','#dc2626','#b45309','#7c3aed','#0891b2','#c2410c','#4338ca'];
var RTYPES=[{id:'ua',n:'UA Report',ic:'📊',d:'User acquisition, retention, engagement',c:'#3b5bdb'},{id:'revenue',n:'Revenue',ic:'💰',d:'IAP, ads, subscriptions',c:'#059669'},{id:'aso',n:'ASO Report',ic:'🏪',d:'Store listing, keywords, ratings',c:'#7c3aed'},{id:'console',n:'Play Console',ic:'📱',d:'Stability, crashes, ANR',c:'#dc2626'}];
async function loadGames(){var d=await fbG('/glist');GAMES=d||[];}
async function saveGames(){await fbS('/glist',GAMES);}
function updNav(){var s1=document.getElementById('ns1'),ng=document.getElementById('nG'),s2=document.getElementById('ns2'),nr=document.getElementById('nR');if(curGame){s1.style.display='';ng.style.display='';ng.textContent=curGame.name;}else{s1.style.display='none';ng.style.display='none';}if(curRpt){s2.style.display='';nr.style.display='';var rt=RTYPES.find(function(r){return r.id===curRpt;});nr.textContent=rt?rt.n:curRpt;}else{s2.style.display='none';nr.style.display='none';}}
function showScr(id){['sHome','sReports','sForm'].forEach(function(s){document.getElementById(s).style.display='none';});document.getElementById(id).style.display='';document.body.classList.remove('prev-mode');}
function goHome(){curGame=null;curRpt=null;curRID=null;stopSubPoll();updNav();renderHome();showScr('sHome');}
function goGame(){curRpt=null;curRID=null;stopSubPoll();updNav();renderRP();showScr('sReports');}
function renderHome(){var el=document.getElementById('sHome');var h='<div class="home-screen"><div class="home-title">Monthly Reports</div><div class="home-sub">Select a game or add a new one.</div><div class="game-grid">';GAMES.forEach(function(g,i){var c=g.color||COLORS[i%COLORS.length];h+='<div class="game-card" onclick="selGame('+i+')"><button class="game-card-del" onclick="event.stopPropagation();delGame('+i+')">✕</button><div class="game-card-icon" style="background:'+c+';">'+g.name.charAt(0).toUpperCase()+'</div><div class="game-card-name">'+g.name+'</div><div class="game-card-meta">'+((g.reports||['ua']).length)+' report(s)</div></div>';});h+='<div class="add-game-card" onclick="addGameM()"><div style="font-size:32px;color:#9ca3af;">+</div><div style="font-size:12px;font-weight:700;color:#6b7280;">Add game</div></div></div></div>';el.innerHTML=h;}
function selGame(i){curGame=GAMES[i];curGame._i=i;updNav();renderRP();showScr('sReports');}
function addGameM(){modal({icon:'🎮',title:'Add Game',msg:'<input type="text" class="cmodal-input" id="ngN" placeholder="Game name"><div class="cmodal-colors" id="ngC"></div>',okText:'Create',cls:'confirm',onOk:async function(){var n=document.getElementById('ngN');if(!n||!n.value.trim()){toast('Enter a name');return;}var cs=document.querySelector('.cmodal-color.selected');var c=cs?cs.getAttribute('data-c'):COLORS[GAMES.length%COLORS.length];GAMES.push({name:n.value.trim(),color:c,reports:['ua']});await saveGames();renderHome();toast('Game created!');}});setTimeout(function(){var cp=document.getElementById('ngC');if(cp){var h='';COLORS.forEach(function(c,i){h+='<div class="cmodal-color'+(i===0?' selected':'')+'" style="background:'+c+';" data-c="'+c+'" onclick="this.parentNode.querySelectorAll(\'.cmodal-color\').forEach(function(x){x.classList.remove(\'selected\');});this.classList.add(\'selected\');"></div>';});cp.innerHTML=h;}},100);}
function delGame(i){var g=GAMES[i];modal({icon:'🗑',title:'Delete "'+g.name+'"?',msg:'All data removed.',okText:'Delete',cls:'danger',onOk:async function(){var sl=g.name.toLowerCase().replace(/[^a-z0-9]+/g,'-');await fbD('/games/'+sl);GAMES.splice(i,1);await saveGames();renderHome();toast('Deleted');}});}
function renderRP(){var g=curGame,c=g.color||'#3b5bdb';var el=document.getElementById('sReports');var h='<div style="max-width:800px;margin:0 auto;padding:40px 20px;"><div style="font-size:11px;font-weight:600;color:#6b7280;cursor:pointer;margin-bottom:16px;" onclick="goHome()">← All games</div><div style="font-size:22px;font-weight:800;color:'+c+';margin-bottom:4px;">'+g.name+'</div><div style="font-size:12px;color:#9ca3af;margin-bottom:28px;">Select a report.</div><div class="rp-grid">';(g.reports||['ua']).forEach(function(rid){var rt=RTYPES.find(function(r){return r.id===rid;});if(!rt)return;h+='<div class="rp-card" onclick="openRpt(\''+rid+'\')"><button class="rp-card-del" onclick="event.stopPropagation();delRpt(\''+rid+'\')" title="Remove">✕</button><div class="rp-card-icon">'+rt.ic+'</div><div class="rp-card-name">'+rt.n+'</div><div class="rp-card-desc">'+rt.d+'</div></div>';});h+='<div class="rp-card" style="background:#f8f9fc;border-style:dashed;text-align:center;" onclick="addRptM()"><div style="font-size:24px;color:#9ca3af;">+</div><div style="font-size:11px;font-weight:700;color:#6b7280;">Add report</div></div></div></div>';el.innerHTML=h;}
function addRptM(){var ex=curGame.reports||[];var av=RTYPES.filter(function(r){return ex.indexOf(r.id)===-1;});if(!av.length){toast('All types added');return;}var h='';av.forEach(function(r){h+='<div style="padding:10px;border:1px solid #e8eaed;border-radius:8px;margin-bottom:8px;cursor:pointer;" onclick="addRpt(\''+r.id+'\')"><b>'+r.ic+' '+r.n+'</b><div style="font-size:10px;color:#9ca3af;">'+r.d+'</div></div>';});modal({icon:'📋',title:'Add Report Type',msg:h,cancel:false,okText:'Close',cls:'cancel'});}
function addRpt(rid){if(!curGame.reports)curGame.reports=[];if(curGame.reports.indexOf(rid)===-1){curGame.reports.push(rid);GAMES[curGame._i]=curGame;saveGames();cModal();renderRP();toast('Added!');}}
function delRpt(rid){if(curGame.reports&&curGame.reports.length<=1){toast('Need at least one');return;}modal({icon:'🗑',title:'Remove report?',msg:'All saved data deleted.',okText:'Remove',cls:'danger',onOk:async function(){curGame.reports=curGame.reports.filter(function(r){return r!==rid;});GAMES[curGame._i]=curGame;await saveGames();var sl=gSlug();await fbD('/games/'+sl+'/reports/'+rid);renderRP();toast('Removed');}});}

/* ═══ REPORT ID SYSTEM ═══ */
var ridList=[],pendingSubs=[],subPollTimer=null;
async function loadRIDs(){var sl=gSlug();ridList=await fbG('/games/'+sl+'/reports/'+curRpt+'/ridList')||[];return ridList;}
async function saveRIDs(){await fbS('/games/'+gSlug()+'/reports/'+curRpt+'/ridList',ridList);}
function createRID(){modal({icon:'🆔',title:'Create Report ID',msg:'<input type="text" class="cmodal-input" id="newRID" placeholder="e.g. Royal Tripeaks Reports #3"><div style="font-size:10px;color:#9ca3af;">Unique ID for this report period.</div>',okText:'Create',cls:'confirm',onOk:async function(){var inp=document.getElementById('newRID');if(!inp||!inp.value.trim()){toast('Enter an ID');return;}var nid=inp.value.trim();if(ridList.indexOf(nid)!==-1){toast('Already exists');return;}ridList.unshift(nid);await saveRIDs();curRID=nid;renderRIDBar();var rs=nid.toLowerCase().replace(/[^a-z0-9]+/g,'-');await fbS('/games/'+gSlug()+'/reports/'+curRpt+'/rids/'+rs+'/data',{cfg:UC,cur:{},prev:{},mode:'cur'});toast('Created: '+nid);await uaLoad();}});}
function renderRIDBar(){var el=document.getElementById('ridBar');if(!el)return;var h='<div class="rid-hdr"><div class="rid-hdr-t">🆔 Report IDs'+(curRID?' — <span style="color:#3b5bdb;">'+esc(curRID)+'</span>':'')+'</div><div style="display:flex;gap:8px;"><button class="ua-btn" onclick="createRID()" style="border-color:#c7d2fe;color:#3b5bdb;">＋ New ID</button></div></div>';if(ridList.length){h+='<div class="rid-tabs">';ridList.forEach(function(rid){var a=rid===curRID?' active':'';var cnt=pendingSubs.filter(function(s){return s.reportId===rid;}).length;var badge=cnt?'<span class="rid-badge">'+cnt+'</span>':'';h+='<div class="rid-tab'+a+'" onclick="switchRID(\''+esc(rid).replace(/'/g,"\\'")+'\')">'+esc(rid)+badge+'</div>';});h+='</div>';}else{h+='<div class="rid-empty">No report IDs yet. Create one to start entering data.</div>';}el.innerHTML=h;}
async function switchRID(rid){if(curRID&&document.getElementById('UP')){if(U.m==='cur')U.C=uSnap();else U.P=uSnap();await uAS();}curRID=rid;renderRIDBar();await uaLoad();}

/* ═══ SUBMISSIONS ═══ */
async function loadSubs(){if(!curGame)return;var sl=gSlug();var d=await fbG('/games/'+sl+'/submissions');pendingSubs=[];if(d){Object.keys(d).forEach(function(k){var s=d[k];if(s&&s.status==='pending'&&s.report===curRpt)pendingSubs.push(s);});}renderRIDBar();}

function vhDel(id){var v=null;for(var i=0;i<VH.length;i++){if(VH[i].id===id){v=VH[i];break;}}if(!v)return;modal({icon:'🗑',title:'Delete "'+v.tag+'"?',msg:'Permanently remove?',okText:'Delete',cls:'danger',onOk:function(){VH=VH.filter(function(x){return x.id!==id;});vhP();vhR();toast('Deleted');}});}
