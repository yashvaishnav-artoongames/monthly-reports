<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Submit Data — Monthly Reports</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Lexend',sans-serif;background:#f0f2f7;color:#1a1d23;min-height:100vh;}
.topbar{background:#fff;border-bottom:1px solid #e8eaed;padding:14px 24px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.04);}
.topbar-brand{font-size:16px;font-weight:800;color:#3b5bdb;}.topbar-sep{color:#d1d5db;}.topbar-crumb{font-size:12px;font-weight:600;color:#6b7280;}
.page{max-width:1060px;margin:0 auto;padding:24px 20px 60px;}
/* Step cards */
.step-card{background:#fff;border:1.5px solid #e8eaed;border-radius:14px;padding:28px 24px;margin-bottom:20px;box-shadow:0 4px 16px rgba(0,0,0,.04);}
.step-card.hidden{display:none;}
.step-title{font-size:14px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.step-icon{width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;flex-shrink:0;}
.field{margin-bottom:14px;}.field-label{font-size:10px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;}
input[type="text"],select,textarea{width:100%;padding:10px 14px;border:1.5px solid #e8eaed;border-radius:8px;font-size:13px;font-family:'Lexend',sans-serif;color:#1a1d23;background:#fff;transition:all .2s;-webkit-appearance:none;}
input:focus,select:focus,textarea:focus{outline:none;border-color:#3b5bdb;box-shadow:0 0 0 3px rgba(59,91,219,.1);}
select{appearance:auto;-webkit-appearance:auto;cursor:pointer;}
textarea{min-height:80px;resize:vertical;line-height:1.7;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}

/* UA-style form */
.ua-page{background:#fff;border:1.5px solid #e8eaed;border-radius:14px;padding:28px 24px;margin-bottom:20px;box-shadow:0 4px 16px rgba(0,0,0,.04);}
.ua-bar{display:flex;align-items:center;justify-content:space-between;background:#f8f9fc;border:1px solid #e8eaed;border-radius:10px;padding:10px 16px;margin-bottom:16px;flex-wrap:wrap;gap:8px;}
.ua-bar-left{display:flex;align-items:center;gap:8px;font-size:11px;font-weight:600;}
.ua-bar-right{display:flex;gap:8px;flex-wrap:wrap;}
.ua-btn{padding:6px 16px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Lexend',sans-serif;border:1px solid #e8eaed;background:#fff;color:#6b7280;touch-action:manipulation;}.ua-btn:hover{border-color:#3b5bdb;color:#3b5bdb;background:#f0f4ff;}
.ua-btn.mode{border-color:#e9d5ff;color:#7c3aed;background:#f5f3ff;}.ua-btn.mode.active{background:#7c3aed;color:#fff;border-color:#7c3aed;}
.ua-badge{font-size:12px;font-weight:700;padding:6px 12px;border-radius:999px;}.ua-badge.cur{color:#059669;background:#ecfdf5;border:1px solid #a7f3d0;}.ua-badge.prev{color:#7c3aed;background:#f5f3ff;border:1px solid #e9d5ff;}
.ua-sec{margin-bottom:28px;}.ua-sec-t{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:#9ca3af;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid #e8eaed;display:flex;align-items:center;gap:8px;}
.ua-sec-icon{width:18px;height:18px;border-radius:5px;display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:#fff;flex-shrink:0;}
.ua-sub{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin:18px 0 10px;padding:5px 12px;border-radius:6px;display:inline-block;}
.ua-fl{font-size:10px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px;}
.ua-mg{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.tw{overflow-x:auto;margin-bottom:4px;border-radius:8px;}
.ua-page table{width:100%;border-collapse:separate;border-spacing:0;font-size:11px;margin-bottom:4px;border:1px solid #e8eaed;border-radius:8px;overflow:hidden;}
.ua-page thead tr{background:#f8f9fc;}.ua-page th{padding:8px 4px;text-align:center;font-size:8px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.4px;border-bottom:2px solid #e8eaed;white-space:nowrap;}.ua-page th:first-child{text-align:left;padding-left:12px;}
.ua-page td{padding:6px 4px;border-bottom:1px solid #f3f4f6;text-align:center;}.ua-page td:first-child{text-align:left;padding-left:12px;font-weight:600;font-size:11px;}.ua-page tbody tr:last-child td{border-bottom:none;}
.ua-page input[type="text"],.ua-page select,.ua-page textarea{padding:7px 6px;border:1px solid #e8eaed;border-radius:6px;font-size:11px;font-family:'Lexend',sans-serif;color:#1a1d23;background:#fffef5;text-align:center;}
.ua-page input:focus,.ua-page select:focus{outline:none;border-color:#3b5bdb;box-shadow:0 0 0 3px rgba(59,91,219,.12);}
.ua-page input.eng{background:#f0fdf4!important;border-color:#bbf7d0!important;}
.cc{background:#fefce8;color:#92400e;}.ce{background:#f0fdf4;color:#166534;}.cr{background:#faf5ff;color:#6b21a8;}.cd{border-left:2px solid #e2e5ea!important;}
.hg th{padding:5px 4px;font-size:8px;font-weight:800;letter-spacing:1px;border-bottom:none;text-align:center;}
.ga{background:#fefce8;color:#92400e;border-bottom:1px solid #fde68a;}.ge{background:#f0fdf4;color:#166534;border-bottom:1px solid #bbf7d0;}
.chip{display:inline-block;font-size:8px;font-weight:700;padding:2px 7px;border-radius:10px;text-transform:uppercase;letter-spacing:.4px;margin-left:6px;vertical-align:middle;}.co{background:#ecfdf5;color:#059669;}.cp{background:#fef3c7;color:#b45309;}.cf{background:#eef2ff;color:#3b5bdb;margin-left:0;}
.stk{display:flex;flex-direction:column;align-items:center;gap:1px;}.fl{font-weight:700;color:#3b5bdb;font-size:11px;white-space:nowrap;}
.ud{height:1px;background:linear-gradient(to right,transparent,#e8eaed,transparent);margin:28px 0;}
.ra{display:flex;gap:8px;margin-top:8px;align-items:center;}
.ab{display:inline-flex;align-items:center;gap:5px;background:#fff;border:1px dashed #d1d5db;border-radius:6px;padding:7px 16px;font-size:11px;font-weight:600;color:#6b7280;cursor:pointer;font-family:'Lexend',sans-serif;}.ab:hover{border-color:#3b5bdb;color:#3b5bdb;background:#f0f4ff;border-style:solid;}
.rb{display:inline-flex;align-items:center;gap:5px;background:#fff;border:1px dashed #fecaca;border-radius:6px;padding:7px 16px;font-size:11px;font-weight:600;color:#dc2626;cursor:pointer;font-family:'Lexend',sans-serif;}.rb:disabled{opacity:.25;pointer-events:none;}
.db{background:none;border:none;color:#d1d5db;font-size:14px;cursor:pointer;padding:2px 6px;border-radius:4px;line-height:1;}.db:hover{color:#dc2626;background:#fef2f2;}
.rg{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}.rg>div{background:#f8f9fc;padding:10px 12px;border-radius:8px;border:1px solid #e8eaed;}

/* Ad source structure */
.sb{background:linear-gradient(135deg,#eef2ff,#e0e7ff);border-left:1px solid #e8eaed;border-right:1px solid #e8eaed;border-bottom:2px solid #c7d2fe;padding:10px 16px;display:flex;align-items:center;gap:12px;min-width:702px;}
.sb .si{width:22px;height:22px;border-radius:6px;background:linear-gradient(135deg,#3b5bdb,#364fc7);display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;font-weight:800;flex-shrink:0;}
.sb .sn{font-size:13px;font-weight:700;color:#3b5bdb;}.sb .sc{font-size:9px;font-weight:700;color:#6366f1;background:#e0e7ff;padding:2px 8px;border-radius:10px;text-transform:uppercase;}.sb .db{margin-left:auto;font-size:16px;}
.ct{width:100%;border-collapse:separate;border-spacing:0;font-size:11px;table-layout:fixed;min-width:702px;border-left:1px solid #e8eaed;border-right:1px solid #e8eaed;}
.ct td{padding:6px 4px;text-align:center;vertical-align:middle;border-bottom:1px solid #f3f4f6;background:#fff;}.ct td:first-child{text-align:left;padding-left:12px;font-weight:600;font-size:11px;}
.ct tr:last-child td{border-bottom:none;}.ct input,.ct select{width:100%;min-width:0;}
.cl{display:flex;align-items:center;gap:5px;min-width:0;}.cl::before{content:'↳';color:#a5b4fc;font-size:14px;font-weight:800;flex-shrink:0;}
.cab{border-left:1px solid #e8eaed;border-right:1px solid #e8eaed;border-bottom:3px solid #e8eaed;background:#f8faff;padding:6px 12px;min-width:702px;}
.sac{display:inline-flex;align-items:center;gap:4px;background:#fff;border:1px dashed #c7d2fe;border-radius:6px;padding:5px 14px;font-size:10px;font-weight:700;color:#3b5bdb;cursor:pointer;font-family:'Lexend',sans-serif;}.sac:hover{background:#eef2ff;border-style:solid;}
.sg:last-child .cab{border-radius:0 0 8px 8px;}
.aht{width:100%;border-collapse:separate;border-spacing:0;font-size:11px;border:1px solid #e8eaed;border-radius:8px 8px 0 0;overflow:hidden;table-layout:fixed;min-width:702px;}
.aht thead tr{background:#f8f9fc;}

/* Prev mode */
body.prev-mode .ua-page{border-color:#7c3aed;box-shadow:0 0 0 4px rgba(124,58,237,.08);}
body.prev-mode .ua-page input[type="text"]:not([readonly]){background:#f5f3ff!important;border-color:#e9d5ff!important;border-style:dashed!important;}
body.prev-mode .ua-page input.eng{background:#f0eaff!important;border-color:#ddd6fe!important;}

.legend{display:flex;gap:14px;margin-bottom:16px;flex-wrap:wrap;padding:10px 14px;background:#f8f9fc;border-radius:8px;border:1px solid #e8eaed;font-size:10px;font-weight:600;color:#6b7280;}
.legend-item{display:flex;align-items:center;gap:6px;}.legend-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0;}

.submit-btn{width:100%;padding:16px;background:linear-gradient(135deg,#3b5bdb,#364fc7);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:800;cursor:pointer;font-family:'Lexend',sans-serif;box-shadow:0 6px 20px rgba(59,91,219,.3);margin-top:16px;transition:all .2s;}
.submit-btn:hover{transform:translateY(-1px);box-shadow:0 8px 28px rgba(59,91,219,.4);}
.submit-btn:disabled{opacity:.5;pointer-events:none;}

.success-card{background:#ecfdf5;border:2px solid #a7f3d0;border-radius:14px;padding:32px;text-align:center;display:none;margin-bottom:20px;}
.success-card.show{display:block;}.success-icon{font-size:48px;margin-bottom:12px;}.success-title{font-size:18px;font-weight:800;color:#059669;margin-bottom:6px;}.success-sub{font-size:12px;color:#6b7280;line-height:1.7;}
.success-btn{margin-top:16px;padding:10px 28px;background:#059669;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Lexend',sans-serif;}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(26,29,35,.88);color:#fff;font-size:11px;font-weight:600;padding:8px 18px;border-radius:20px;pointer-events:none;opacity:0;transition:opacity .3s;z-index:999;}.toast.show{opacity:1;}
.loading-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(255,255,255,.85);z-index:9999;align-items:center;justify-content:center;flex-direction:column;gap:12px;}.loading-overlay.show{display:flex;}
.loading-spinner{width:36px;height:36px;border:3px solid #e8eaed;border-top-color:#3b5bdb;border-radius:50%;animation:spin .8s linear infinite;}@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-size:13px;font-weight:700;color:#3b5bdb;}

.rid-card{border:1.5px solid #e8eaed;border-radius:10px;padding:14px 16px;cursor:pointer;transition:all .2s;margin-bottom:8px;display:flex;align-items:center;gap:12px;}
.rid-card:hover{border-color:#3b5bdb;background:#f0f4ff;}.rid-card.active{border-color:#3b5bdb;background:#eef2ff;box-shadow:0 0 0 3px rgba(59,91,219,.1);}
.rid-card-icon{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#3b5bdb,#364fc7);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#fff;flex-shrink:0;}
.rid-card-name{font-size:13px;font-weight:700;}.rid-card-meta{font-size:10px;color:#9ca3af;margin-top:2px;}
.no-reports{text-align:center;padding:24px;color:#9ca3af;font-size:12px;background:#f8f9fc;border-radius:10px;border:1px dashed #e8eaed;}

@media(max-width:768px){.page{padding:16px 12px;}.ua-page{padding:20px 14px;}.ua-mg,.grid2{grid-template-columns:1fr;}.rg,.grid3{grid-template-columns:1fr 1fr;}}
@media(max-width:420px){.rg,.grid3{grid-template-columns:1fr;}}
</style>
</head>
<body>

<div class="topbar">
<span class="topbar-brand">📊 Reports</span>
<span class="topbar-sep">›</span>
<span class="topbar-crumb">Submit Data</span>
</div>

<div class="page">

<!-- Success card (hidden by default, shown after submit) -->
<div class="success-card" id="successCard">
<div class="success-icon">✅</div>
<div class="success-title">Submitted!</div>
<div class="success-sub">Your data has been sent for review. The report owner will approve or reject it.</div>
<button class="success-btn" id="resetBtn">Submit Another</button>
</div>

<!-- Step 1: Identity + Report ID Selection -->
<div class="step-card" id="step1">
<div class="step-title"><span class="step-icon" style="background:#6b7280;">1</span> Your Info & Report Selection</div>
<div class="grid2">
<div class="field"><div class="field-label">Your name</div><input type="text" id="subName" placeholder="e.g. Sarah K."></div>
<div class="field"><div class="field-label">Game</div><select id="subGame"><option value="">Loading…</option></select></div>
</div>
<div class="field" style="margin-top:8px;"><div class="field-label">Select Report ID</div><div id="ridList"><div class="no-reports">Select a game first</div></div></div>
</div>

<!-- Step 2: Full UA Form -->
<div id="formWrap" class="hidden"></div>

</div>

<div class="loading-overlay" id="loadOv"><div class="loading-spinner"></div><div class="loading-text">Submitting…</div></div>
<div class="toast" id="tst"></div>

<script>
var FB='https://monthly-reports-database-default-rtdb.asia-southeast1.firebasedatabase.app';
var GAMES=[],curGame=null,selRID=null;
var SUB={C:{},P:{},m:'cur',gid:0,cC:0,sC:0,kC:0,iC:0,aC:0,rC:0,tC:0};
var UC={countries:['United States','Germany','United Kingdom','France','Japan','Canada','Italy','South Korea','Australia'],sources:['Google Ads','Unity Ads','Apple Ads','AppLovin','Facebook Ads'],campaigns:{'Google Ads':['USA ROAS Max Conv','Top Countries ROAS','World ROAS 45%'],'Unity Ads':['Install 125 USA'],'Facebook Ads':['Top Countries 25'],'Apple Ads':[],'AppLovin':[]},platforms:['Android','iPhone','Both']};
var CG='<colgroup><col style="width:160px"><col style="width:62px"><col style="width:62px"><col style="width:62px"><col style="width:56px"><col style="width:52px"><col style="width:52px"><col style="width:56px"><col style="width:56px"><col style="width:56px"><col style="width:28px"></colgroup>';

async function fbG(p){try{var r=await fetch(FB+p+'.json');if(r.ok)return r.json();}catch(e){}return null;}
async function fbS(p,d){try{var r=await fetch(FB+p+'.json',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)});return r.ok;}catch(e){}return false;}
function toast(m){var t=document.getElementById('tst');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove('show');},1800);}
function gSlug(name){return name.toLowerCase().replace(/[^a-z0-9]+/g,'-');}

/* ═══ SNAPSHOT (mirrors main dashboard exactly) ═══ */
function uSnap(){
  var d={};
  document.querySelectorAll('#subForm input[type="text"],#subForm textarea,#subForm select').forEach(function(el){
    if(!el.id)return;d[el.id]=el.value;
  });
  d._ag=[];
  document.querySelectorAll('#adB .sg').forEach(function(g){
    var s=g.getAttribute('data-s')||'',c=[];
    g.querySelectorAll('.scr').forEach(function(r){var v=[];r.querySelectorAll('select,input').forEach(function(e){v.push(e.value);});c.push(v);});
    d._ag.push({s:s,c:c});
  });
  d._d={};
  ['cB','sB','kB','iB','aB'].forEach(function(t){var rows=[];var el=document.getElementById(t);if(!el)return;el.querySelectorAll('tr').forEach(function(r){var v=[];r.querySelectorAll('select,input').forEach(function(e){v.push(e.value);});rows.push(v);});d._d[t]=rows;});
  ['rB|ret_','tB|sl_'].forEach(function(x){var p=x.split('|');var rows=[];var el=document.getElementById(p[0]);if(!el)return;el.querySelectorAll('tr[id^="'+p[1]+'"]').forEach(function(r){var v=[];r.querySelectorAll('select,input').forEach(function(e){v.push(e.value);});rows.push(v);});d._d[p[1]+'r']=rows;});
  return d;
}
function uRest(d){if(!d)return;Object.keys(d).forEach(function(id){if(id==='_d'||id==='_ag')return;var el=document.getElementById(id);if(el)el.value=d[id]||'';});}
function uRestFull(d){
  uRest(d);
  if(d._ag)restAG(d._ag);else{var ab=document.getElementById('adB');if(ab)ab.innerHTML='';SUB.gid=0;}
  if(d._d){
    ['cB','sB','kB','iB','aB'].forEach(function(t){var el=document.getElementById(t);if(el)el.innerHTML='';});
    var rb=document.getElementById('rB');if(rb)rb.querySelectorAll('tr[id^="ret_"]').forEach(function(r){r.remove();});
    var tb=document.getElementById('tB');if(tb)tb.querySelectorAll('tr[id^="sl_"]').forEach(function(r){r.remove();});
    SUB.cC=0;SUB.sC=0;SUB.kC=0;SUB.iC=0;SUB.aC=0;SUB.rC=0;SUB.tC=0;
    var bm={cB:addCR,sB:addSR,kB:addKR,iB:addIR,aB:addAR};
    Object.keys(bm).forEach(function(t){(d._d[t]||[]).forEach(function(row){bm[t]();var el=document.getElementById(t);if(!el)return;var els=el.lastElementChild.querySelectorAll('select,input');row.forEach(function(v,j){if(els[j])els[j].value=v;});});});
    (d._d['ret_r']||[]).forEach(function(row){addRR();var els=document.getElementById('rB').lastElementChild.querySelectorAll('select,input');row.forEach(function(v,j){if(els[j])els[j].value=v;});});
    (d._d['sl_r']||[]).forEach(function(row){addTR();var els=document.getElementById('tB').lastElementChild.querySelectorAll('select,input');row.forEach(function(v,j){if(els[j])els[j].value=v;});});
    rn('cB');rn('kB');rn('iB');rn('aB');
  }
}

/* ═══ MODE SWITCH ═══ */
function swMode(nm){
  if(SUB.m==='cur')SUB.C=uSnap();else SUB.P=uSnap();
  SUB.m=nm;
  uRestFull(SUB.m==='cur'?SUB.C:SUB.P);
  document.body.classList.toggle('prev-mode',SUB.m==='prev');
  var b=document.getElementById('subBadge');if(b){b.textContent=SUB.m==='cur'?'● Current period':'● Previous period';b.className='ua-badge '+(SUB.m==='cur'?'cur':'prev');}
  var btn=document.getElementById('subModeBtn');if(btn){btn.classList.toggle('active',SUB.m==='prev');btn.textContent=SUB.m==='prev'?'✏️ Switch to Current':'✏️ Switch to Previous';}
  toast(SUB.m==='cur'?'Current':'Previous');
}

/* ═══ ROW BUILDERS (identical to main dashboard) ═══ */
function cOpt(){var h='<option value="">— select —</option>';UC.countries.forEach(function(v){h+='<option value="'+v+'">'+v+'</option>';});return h;}
function dv(id,w){return'<div class="stk"><input type="text" id="'+id+'" style="width:'+w+'px;"></div>';}

function addCR(){SUB.cC++;var n=SUB.cC;document.getElementById('cB').insertAdjacentHTML('beforeend','<tr id="cr_'+n+'"><td style="font-weight:800;color:#3b5bdb;text-align:center;">'+n+'</td><td><select class="ddc" style="width:96px;">'+cOpt()+'</select></td><td><input type="text" style="width:56px;"></td><td><input type="text" style="width:56px;"></td><td><input type="text" style="width:56px;"></td><td><input type="text" style="width:52px;"></td><td><input type="text" style="width:46px;"></td><td class="cd"><input type="text" class="eng" style="width:52px;"></td><td><input type="text" class="eng" style="width:52px;"></td><td><input type="text" class="eng" style="width:52px;"></td><td><button class="db" onclick="dr(\'cr_'+n+'\',\'cB\',\'rCR\',1)">✕</button></td></tr>');ub('rCR','cB');}

  h+='<div class="ua-sub" style="background:#f5f3ff;color:#6b21a8;margin-top:22px;">Monetization</div><div class="rg">';
  [['ARPU','m_ar'],['ARPPU','m_ap'],['Paying %','m_pp'],['Avg trans','m_at'],['Trans/user','m_tu'],['UA cost','m_uc'],['CPU','m_cp'],['ROAS','m_ro'],['Target','m_tg']].forEach(function(x){h+='<div><div class="ua-fl">'+x[0]+'</div><input type="text" id="'+x[1]+'"></div>';});
  h+='</div></div><div class="ud"></div>';
  /* K */ h+='<div class="ua-sec"><div class="ua-sec-t"><span class="ua-sec-icon" style="background:#b45309;">K</span>Actions</div><div class="tw"><table style="min-width:760px;"><thead><tr><th style="width:28px;">#</th><th style="width:250px;">Action</th><th style="width:110px;">Owner</th><th class="cc">Priority</th><th class="cc">Status</th><th class="cc">Due</th><th style="width:28px;"></th></tr></thead><tbody id="aB"></tbody></table></div><div class="ra"><button class="ab" id="aAC">＋ Add</button><button class="rb" id="rAC">− Remove</button></div></div>';
  /* L */ h+='<div class="ua-sec"><div class="ua-sec-t"><span class="ua-sec-icon" style="background:#6b7280;">L</span>Notes</div><textarea id="ua_notes" placeholder="Budget, campaigns, ASO…"></textarea></div>';
  h+='<button class="submit-btn" id="submitBtn">📩 Submit Report for Review</button>';
  h+='</div>';
  wrap.innerHTML=h;
  wrap.classList.remove('hidden');
  /* Seed rows */
  seedStAll();rfSP();
  for(var i=0;i<5;i++)addCR();for(i=0;i<3;i++){addSR();addKR();addIR();addAR();}
  /* Bind buttons */
  document.getElementById('aSrc').addEventListener('click',function(){var p=document.getElementById('sPk');if(!p.value){p.focus();return;}var gid=addSG(p.value);if(gid)addSCR(gid);p.value='';});
  document.getElementById('aCR').addEventListener('click',addCR);document.getElementById('rCR').addEventListener('click',function(){rl('cB','rCR',1);});
  document.getElementById('aRet').addEventListener('click',addRR);document.getElementById('rRet').addEventListener('click',function(){rlp('rB','ret_','rRet');});
  document.getElementById('aST').addEventListener('click',addSR);document.getElementById('rST').addEventListener('click',function(){rl('sB','rST');});
  document.getElementById('aTR').addEventListener('click',addTR);document.getElementById('rTR').addEventListener('click',function(){rlp('tB','sl_','rTR');});
  document.getElementById('aKW').addEventListener('click',addKR);document.getElementById('rKW').addEventListener('click',function(){rl('kB','rKW',1);});
  document.getElementById('aIP').addEventListener('click',addIR);document.getElementById('rIP').addEventListener('click',function(){rl('iB','rIP',1);});
  document.getElementById('aAC').addEventListener('click',addAR);document.getElementById('rAC').addEventListener('click',function(){rl('aB','rAC',1);});
  /* Submit */
  document.getElementById('submitBtn').addEventListener('click',doSubmit);
}

/* ═══ LOAD CONFIG FROM REPORT ═══ */
async function loadReportConfig(){
  var sl=gSlug(curGame.name);
  var d=await fbG('/games/'+sl+'/reports/ua/rids/'+gSlug(selRID)+'/data');
  if(d&&d.cfg){UC=d.cfg;}
}

/* ═══ SUBMIT ═══ */
async function doSubmit(){
  var name=document.getElementById('subName').value.trim();
  if(!name){toast('Enter your name');document.getElementById('subName').focus();return;}
  if(!selRID){toast('Select a report ID');return;}
  /* Capture current mode data */
  if(SUB.m==='cur')SUB.C=uSnap();else SUB.P=uSnap();
  var sl=gSlug(curGame.name);
  var ridSlug=gSlug(selRID);
  var submission={
    id:Date.now(),
    submitter:name,
    game:curGame.name,
    gameSlug:sl,
    reportId:selRID,
    ridSlug:ridSlug,
    report:'ua',
    date:new Date().toISOString(),
    status:'pending',
    cur:JSON.parse(JSON.stringify(SUB.C)),
    prev:JSON.parse(JSON.stringify(SUB.P))
  };
  document.getElementById('loadOv').classList.add('show');
  var ok=await fbS('/games/'+sl+'/submissions/sub_'+submission.id,submission);
  document.getElementById('loadOv').classList.remove('show');
  if(ok){
    document.getElementById('formWrap').classList.add('hidden');
    document.getElementById('step1').classList.add('hidden');
    document.getElementById('successCard').classList.add('show');
    document.body.classList.remove('prev-mode');
    toast('Submitted!');
  }else{toast('Failed — check connection');}
}

/* ═══ RESET ═══ */
document.getElementById('resetBtn').addEventListener('click',function(){
  document.getElementById('successCard').classList.remove('show');
  document.getElementById('step1').classList.remove('hidden');
  document.getElementById('formWrap').classList.add('hidden');
  document.getElementById('formWrap').innerHTML='';
  selRID=null;
  /* Re-render report IDs */
  if(curGame)loadRIDs(curGame);
  document.body.classList.remove('prev-mode');
});

/* ═══ INIT ═══ */
async function init(){
  var d=await fbG('/glist');GAMES=d||[];
  var gs=document.getElementById('subGame');
  gs.innerHTML='<option value="">— select game —</option>';
  GAMES.forEach(function(g,i){gs.innerHTML+='<option value="'+i+'">'+g.name+'</option>';});
}

document.getElementById('subGame').addEventListener('change',function(){
  var idx=this.value;
  if(!idx&&idx!==0){document.getElementById('ridList').innerHTML='<div class="no-reports">Select a game first</div>';document.getElementById('formWrap').classList.add('hidden');return;}
  curGame=GAMES[parseInt(idx)];
  selRID=null;
  document.getElementById('formWrap').classList.add('hidden');
  loadRIDs(curGame);
});

async function loadRIDs(game){
  var sl=gSlug(game.name);
  var rids=await fbG('/games/'+sl+'/reports/ua/ridList');
  var el=document.getElementById('ridList');
  if(!rids||!rids.length){el.innerHTML='<div class="no-reports">No report IDs created yet. Ask the report owner to create one in the dashboard.</div>';return;}
  el.innerHTML='';
  rids.forEach(function(rid){
    var card=document.createElement('div');
    card.className='rid-card';
    card.innerHTML='<div class="rid-card-icon">#</div><div><div class="rid-card-name">'+rid+'</div><div class="rid-card-meta">Click to select and start filling data</div></div>';
    card.addEventListener('click',function(){
      el.querySelectorAll('.rid-card').forEach(function(c){c.classList.remove('active');});
      card.classList.add('active');
      selRID=rid;
      loadReportConfig().then(function(){buildForm();});
    });
    el.appendChild(card);
  });
}

init();
</script>
